{% extends 'base.html' %}
{% block content %}
<div class="login-wrapper">
    <div class="card login-card" style="width: 100%; max-width: 420px;">
        <div class="card-header">
            <h4 class="mb-1 fw-bold">Stoma</h4>
            <small class="opacity-90">Stomatologik klinika — tizimga kirish</small>
        </div>
        <div class="card-body">
            {% if error %}
            <div class="alert alert-danger py-3">Login yoki parol noto'g'ri</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Foydalanuvchi nomi</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Foydalanuvchi nomi" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Parol</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">Kirish</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
