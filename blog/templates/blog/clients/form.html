{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">{{ title }}</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for f in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ f.label }}</label>
                        {{ f }}
                        {% if f.errors %}<div class="text-danger small">{{ f.errors.0 }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Saqlash</button>
                        <a href="{% if client %}{% url 'client_detail' client.pk %}{% else %}{% url 'client_list' %}{% endif %}" class="btn btn-outline-secondary">Bekor</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
